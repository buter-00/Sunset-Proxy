<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sunset Proxy</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/controls.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/modals.css">
</head>
<body>
  <div class="header">
    <div class="header-left">
      <button class="nav-btn" id="theme-btn">
        <svg id="t-icon" viewBox="0 0 24 24" style="width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;"><path id="t-path" d=""/></svg>
      </button>
      <button class="nav-btn color-btn" id="color-btn">
        <div id="color-preview" style="width:16px;height:16px;border-radius:3px;background:#22c55e;"></div>
      </button>
    </div>

    <div class="header-center">
      <svg class="header-logo" viewBox="248 238 528 543" xmlns="http://www.w3.org/2000/svg" fill="currentColor" style="width:36px;height:36px;">
        <g transform="translate(0 1024) scale(0.1 -0.1)">
          <path d="M4770 7824c-424-37-552-54-810-105-343-68-624-153-949-286l-114-47 6-456c7-483 15-633 48-958 50-500 129-894 253-1266 181-539 444-987 822-1401 269-293 669-609 1010-796l76-42 65 32c106 52 317 187 467 299 717 535 1200 1228 1440 2069 172 601 241 1163 253 2054l6 457-25 16c-41 27-315 132-470 180-380 118-734 189-1148 231-147 15-817 29-930 19zm880-273c292-30 618-88 880-157 142-38 421-128 503-163l48-21-2-282c-6-879-97-1561-284-2124-242-729-672-1324-1289-1786-124-93-367-248-387-248-20 0-248 144-364 230-263 196-547 469-719 690-498 643-750 1372-841 2430-21 247-37 681-33 905l3 190 100 38c405 154 925 264 1450 306 142 12 798 6 935-8z"/>
          <path d="M4941 7055c-222-49-358-145-435-309-117-249-72-521 121-726 97-103 206-185 554-416 394-261 537-378 658-539 110-146 155-285 155-475-1-142-15-222-67-358-40-106-30-105 52 8 135 183 191 357 191 593 0 137-15 218-57 328-42 108-93 180-207 295-126 125-249 208-581 389-296 162-396 227-486 317-127 127-176 292-134 453 59 225 299 346 573 289 296-61 500-285 574-632 11-54 22-103 24-109 2-9 24-13 64-13l60 0 0 430 0 430-45 0c-25 0-45-4-45-9 0-15-54-45-79-43-13 1-80 18-150 37-200 55-339 75-519 74-93 0-183-6-221-14z"/>
          <path d="M4280 6713c-78-98-159-251-185-353-26-100-31-308-11-411 35-172 99-283 250-435 125-124 276-226 571-384 381-203 523-316 601-474 36-75 39-86 42-187 6-163-27-255-125-351-96-94-217-133-388-125-185 8-328 67-465 194-146 135-239 315-289 559l-19 89-53-2c-30-2-59-5-65-7-8-3-10-134-7-463l5-458 39-3c34-3 46 2 80 32 21 20 48 36 59 36 11 0 89-20 173-44 312-91 536-112 782-74 314 48 507 265 522 588 6 135-12 227-69 340-36 71-62 104-153 196-128 129-183 170-520 392-390 256-533 372-645 520-179 237-211 537-87 830 19 45 33 82 31 82-2 0-36-39-74-87z"/>
        </g>
      </svg>
      <h3 id="header-title" class="header-title"></h3>
    </div>

    <div class="header-right">
      <button class="nav-btn" id="lang-btn">RU</button>
    </div>
    <input type="color" id="color-picker" style="display:none;" value="#22c55e">
  </div>

  <div class="container" id="ui-main">
    <div class="info-box">
      <div class="info-row">
        <span class="label" id="l-ip"></span>
        <div class="ip-box" id="ip-toggle">
          <span id="v-ip">••• ••• ••• •••</span>
          <div id="eye-box"></div>
        </div>
      </div>
      <div class="info-row" id="ip-warning-row" style="display:none;">
        <span id="ip-warning" class="warning"></span>
      </div>
      <div class="info-row">
        <span class="label" id="l-ipv6">IPv6</span>
        <div class="toggle-switch" id="ipv6-toggle">
          <input type="checkbox" id="ipv6-checkbox" class="toggle-checkbox">
          <label class="toggle-label" for="ipv6-checkbox"></label>
        </div>
      </div>
      <div class="info-row">
        <span class="label" id="l-co"></span>
        <div style="display:flex; gap:6px; align-items:center;">
          <img id="flag-img" src="">
          <b id="v-co">—</b>
        </div>
      </div>
      <div class="info-row">
        <span class="label" id="l-pi"></span>
        <div class="ping-row">
          <b id="v-pi">— мс</b>
          <div class="select-box" id="custom-select">
            <div class="select-trigger" id="select-trigger"><span id="selected-val">8.8.8.8</span><div class="arrow">▼</div></div>
            <div class="options-list"></div>
          </div>
        </div>
      </div>
      <div class="info-row">
        <span class="label" id="l-wr"></span>
        <div class="dot" id="top-dot"></div>
      </div>

    </div>

    <div id="color-controls" class="color-controls" style="display:none;">
      <button id="color-reset" class="color-btn-small"></button>
      <button id="color-save" class="color-btn-small accent"></button>
    </div>

    <div class="content">
      <div class="btn-wrapper">
        <svg class="progress-ring" width="160" height="160">
          <circle class="ring-track" r="70" cx="80" cy="80"/>
          <circle class="ring-circle" r="70" cx="80" cy="80"/>
        </svg>
        <div class="power-btn" id="pwr">
          <svg viewBox="0 0 24 24"><path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.58-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z"/></svg>
        </div>
      </div>

      <div class="status">
        <div class="status-dot"></div>
        <span id="st-txt"></span>
      </div>

      <div class="timer">
        <div><span class="t-val" id="th">00</span><span class="t-sub" id="sh">ч</span></div>
        <span class="time-sep">:</span>
        <div><span class="t-val" id="tm">00</span><span class="t-sub" id="sm">м</span></div>
        <span class="time-sep">:</span>
        <div><span class="t-val" id="ts">00</span><span class="t-sub" id="ss">с</span></div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-left">
      <button class="nav-btn account-btn" id="account-btn">
        <span id="header-account-icon" class="account-icon"></span>
      </button>
      <span id="header-account-name" class="account-name">user</span>
    </div>

    <div class="menu-wrapper">
      <button class="nav-btn menu-btn" id="menu-btn">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
      </button>
      <div class="menu-dropdown" id="menu-dropdown">
        <button class="menu-item" id="menu-autosites">
          <span id="menu-autosites-text"></span>
        </button>
        <button class="menu-item" id="menu-import">
          <span id="menu-import-text"></span>
        </button>
        <button class="menu-item" id="menu-export">
          <span id="menu-export-text"></span>
        </button>
        <button class="menu-item" id="menu-webrtc">
          <span id="menu-webrtc-text">WebRTC</span>
        </button>
        <div class="menu-divider"></div>
        <div class="menu-version" style="display:block;">v<span id="menu-version-num">0.0.1</span></div>
      </div>
    </div>
  </div>

  <div id="auth-modal">
    <div class="modal-box">
      <h2 id="auth-title"></h2>
      <input type="text" id="auth-username" class="modal-input">
      <input type="password" id="auth-password" class="modal-input">
      <button id="auth-submit" class="modal-btn"></button>
      <button id="auth-forget" class="modal-btn"></button>
    </div>
  </div>

  <div id="site-modal" style="display:none;">
    <div class="modal-box">
      <h2 id="site-title">Auto Proxy Sites</h2>
      <div id="site-list"></div>
      <input type="text" id="site-input" class="modal-input" placeholder="">
      <button id="site-add" class="modal-btn">Add</button>
      <button id="site-close" class="modal-btn">Close</button>
    </div>
  </div>
  <div id="import-window" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:10000;align-items:center;justify-content:center;">
    <div class="modal-box" style="position:relative;padding:28px 24px;width:320px;box-shadow:0 8px 32px rgba(0,0,0,0.3);display:flex;flex-direction:column;gap:18px;">
      <button id="import-close" style="position:absolute;top:8px;right:10px;font-size:18px;background:none;border:none;color:var(--sub);cursor:pointer;">×</button>
      <h2 id="import-title" style="color:var(--text);text-align:center;margin:0;font-size:14px;"></h2>
      <div id="import-drop" class="dashed-border-rotate" style="width:100%;text-align:center;cursor:pointer;">
        <div id="import-drop-hint" style="position:relative;z-index:3;font-size:13px;pointer-events:none;color:var(--text);"></div>
      </div>
      <input type="file" id="import-window-file" accept="application/json" style="display:none;">
    </div>
  </div>
  <div id="export-window" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:10000;align-items:center;justify-content:center;">
    <div class="modal-box" style="position:relative;padding:28px 24px;width:320px;box-shadow:0 8px 32px rgba(0,0,0,0.3);display:flex;flex-direction:column;gap:12px;">
      <button id="export-close" style="position:absolute;top:8px;right:10px;font-size:18px;background:none;border:none;color:var(--sub);cursor:pointer;">×</button>
      <h2 id="export-title" style="color:var(--text);text-align:center;margin:0;font-size:14px;"></h2>
      <button id="export-do" class="modal-btn" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:6px;background:var(--accent);color:#000;font-weight:bold;cursor:pointer;text-transform:uppercase;font-size:10px;margin-bottom:6px;transition:0.2s;display:block !important;"></button>
    </div>
  </div>
  <script src="js/constants.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/network.js"></script>
  <script src="js/locales.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/handlers.js"></script>
  <script src="js/popup.js"></script>
</body>
</html>
